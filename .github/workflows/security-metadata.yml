name: Security Metadata

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-insights:
    name: Validate Security Insights
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate document
        shell: bash
        run: |
          set -euo pipefail
          schema="target/security-insights-schema.cue"
          mkdir -p target
          curl --fail --silent --show-error --location \
            --proto '=https' \
            --proto-redir '=https' \
            "https://raw.githubusercontent.com/ossf/security-insights/701ac2a02ef17fc8b316f5df685428773c51372a/spec/schema.cue" \
            --output "${schema}"
          docker compose --file .github/tools/compose.yml run --rm \
            cue vet -d '#SecurityInsights' "${schema}" SECURITY-INSIGHTS.yml

  actionlint:
    name: Validate GitHub Actions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run actionlint
        shell: bash
        run: |
          docker compose --file .github/tools/compose.yml run --rm actionlint -color
