name: Feature request
description: Propose a focused enhancement.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or integration problem should be solved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security and compatibility impact
      description: Describe trust-boundary, API, dependency, and migration effects.
    validations:
      required: true
