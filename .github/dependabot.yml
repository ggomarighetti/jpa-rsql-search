version: 2

updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Argentina/Cordoba"

    open-pull-requests-limit: 5

    labels:
      - "dependencies"
      - "java"
      - "maven"

    commit-message:
      prefix: "deps"
      include: "scope"

    groups:
      maven-dependencies:
        patterns:
          - "*"
        update-types:
          - "major"
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Argentina/Cordoba"

    labels:
      - "dependencies"
      - "github-actions"

    commit-message:
      prefix: "ci"
      include: "scope"

  - package-ecosystem: "docker-compose"
    directory: "/.github/tools"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Argentina/Cordoba"

    labels:
      - "dependencies"
      - "docker"

    commit-message:
      prefix: "ci"
      include: "scope"

    groups:
      ci-images:
        patterns:
          - "*"
        update-types:
          - "major"
          - "minor"
          - "patch"

  - package-ecosystem: "docker"
    directory: "/.github/clusterfuzzlite"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Argentina/Cordoba"

    labels:
      - "dependencies"
      - "docker"

    commit-message:
      prefix: "ci"
      include: "scope"
